databases:
  - name: night-stars-db
    databaseName: nightstars
    user: nightstars
    plan: free

services:
  - type: worker
    name: night-stars-bot
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install
    startCommand: pnpm --filter @workspace/db run push && pnpm --filter @workspace/discord-bot run start
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: night-stars-db
          property: connectionString
      - key: NODE_ENV
        value: production
